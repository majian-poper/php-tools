laravel: '@testbench'

providers:
  - PHPTools\Approval\ApprovalServiceProvider
  - PHPTools\LaravelCsvParser\CsvParserPackageServiceProvider
  - PHPTools\LaravelDatabaseTask\DatabaseTaskServiceProvider
  - PHPTools\LaravelFilamentApproval\FilamentApprovalServiceProvider

migrations:
  - workbench/database/migrations

workbench:
  start: '/'
  install: true
  health: false
  discovers:
    web: false
    api: false
    commands: false
    components: false
    factories: true
    views: false
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets:
    - laravel-assets
  sync:
    - from: storage
      to: workbench/storage
      reverse: true
